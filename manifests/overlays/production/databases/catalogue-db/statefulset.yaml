---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: catalogue-db
  labels:
    name: catalogue-db
  namespace: sock-shop
spec:
  serviceName: catalogue-db
  replicas: 1
  selector:
    matchLabels:
      name: catalogue-db
  template:
    metadata:
      labels:
        name: catalogue-db
    spec:

      securityContext:
        runAsUser: 1337
        runAsGroup: 1337
        fsGroup: 2000

      containers:
        - name: catalogue-db
          image: quay.io/powercloud/sock-shop-catalogue-db:latest
          imagePullPolicy: IfNotPresent

          envFrom:
          - secretRef:
              name: catalogue-db-secret

          ports:
            - name: mysql
              containerPort: 3306
          volumeMounts:
            - mountPath: /var/lib/mysql
              name: catalogue-data
          securityContext:
            privileged: false
            seccompProfile:
              type: RuntimeDefault
            capabilities:
              drop:
                - ALL
  
      nodeSelector:
        kubernetes.io/arch: amd64
        node-role.kubernetes.io/worker: ""

  volumeClaimTemplates:
      - metadata:
          name: catalogue-data
        spec:
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 10Gi
          storageClassName: standard