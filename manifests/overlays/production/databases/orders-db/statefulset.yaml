apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: orders-db
  labels:
    name: orders-db
  namespace: sock-shop
spec:
  serviceName: orders-db
  replicas: 1
  selector:
    matchLabels:
      name: orders-db
  template:
    metadata:
      labels:
        name: orders-db
    spec:
      containers:
        - name: orders-db
          image: quay.io/mongodb/mongodb:org-4.4-standalone-ubuntu2204
          imagePullPolicy: IfNotPresent
          ports:
            - name: mongo
              containerPort: 27017
          
          envFrom:
          - secretRef:
              name: orders-db-secret
              
          securityContext:
            readOnlyRootFilesystem: true
          volumeMounts:
            - mountPath: /tmp
              name: orders-db-temp-vol
            - mountPath: /data/db
              name: orders-db-data # the durable data volume
      volumes:
        - name: orders-db-temp-vol
          persistentVolumeClaim:
            claimName: orders-db-temp-pvc

      nodeSelector:
        node-role.kubernetes.io/worker: ""
        kubernetes.io/arch: amd64

  volumeClaimTemplates:
    - metadata:
        name: orders-db-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi 
        storageClassName: standard