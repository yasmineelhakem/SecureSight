---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: rabbitmq
  labels:
    name: rabbitmq
  namespace: sock-shop
spec:
  serviceName: rabbitmq
  replicas: 1
  selector:
    matchLabels:
      name: rabbitmq
  template:
    metadata:
      labels:
        name: rabbitmq
      annotations:
        prometheus.io/scrape: "false"
    spec:
      containers:
        - name: rabbitmq
          image: quay.io/powercloud/rabbitmq:latest
          imagePullPolicy: IfNotPresent
          command: ["/usr/bin/bash"]
          args: ["/usr/local/bin/docker-entrypoint.sh", "rabbitmq-server"]
          ports:
            - containerPort: 15672
              name: management
            - containerPort: 5672
              name: rabbitmq
        
          envFrom:
          - secretRef:
              name: carts-db-secret
              
          securityContext:
            readOnlyRootFilesystem: false

          volumeMounts:
            - name: rabbitmq-data
              mountPath: /var/lib/rabbitmq

        - name: rabbitmq-exporter
          image: ghcr.io/kbudde/rabbitmq_exporter:1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 9090
              name: exporter
      nodeSelector:
        node-role.kubernetes.io/worker: ""
        kubernetes.io/arch: amd64
  volumeClaimTemplates:
    - metadata:
        name: rabbitmq-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 5Gi 
        storageClassName: standard
