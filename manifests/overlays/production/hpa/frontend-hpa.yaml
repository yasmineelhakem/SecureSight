apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: frontend-hpa
  namespace: sock-shop
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: frontend
  minReplicas: 2                   
  maxReplicas: 10                  
  
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70     
  
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80      
  
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300   # wait 5 min before scaling down
      policies:
      - type: Percent
        value: 50                        # scale down max 50% of pods at once
        periodSeconds: 60
      - type: Pods
        value: 1                         # or remove 1 pod at a time
        periodSeconds: 60
      selectPolicy: Min                  # use the slower policy
    
    scaleUp:
      stabilizationWindowSeconds: 0      # scale up immediately
      policies:
      - type: Percent
        value: 100                       # can double pods quickly
        periodSeconds: 15
      - type: Pods
        value: 2                         # or add 2 pods at a time
        periodSeconds: 15
      selectPolicy: Max                  # use the faster policy