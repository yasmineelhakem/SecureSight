apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: payment-netpol
  namespace: sock-shop
  labels:
    app: payment
    policy: application
    tier: backend
spec:
  podSelector:
    matchLabels:
      name: payment
  
  policyTypes:
  - Ingress
  
  ingress:
  - from:
    - podSelector:
        matchLabels:
          name: orders
    ports:
    - protocol: TCP
      port: 8080
  