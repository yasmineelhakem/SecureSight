---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalogue-db
  labels:
    name: catalogue-db
  namespace: sock-shop
spec:
  replicas: 1
  selector:
    matchLabels:
      name: catalogue-db
  template:
    metadata:
      labels:
        name: catalogue-db
    spec:

      securityContext:
        runAsUser: 1337
        runAsGroup: 1337
        fsGroup: 2000

      containers:
        - name: catalogue-db
          image: quay.io/powercloud/sock-shop-catalogue-db:latest
          imagePullPolicy: IfNotPresent

          #envFrom:
          #- secretRef:
           #   name: catalogue-db-secret

          env:
            - name: MARIADB_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: catalogue-db-secret
                  key: MARIADB_ROOT_PASSWORD
            #- name: MARIADB_USER
             # value: root
            - name: MARIADB_DATABASE
              value: socksdb

          ports:
            - name: mysql
              containerPort: 3306
          volumeMounts:
            - mountPath: /var/lib/mysql
              name: catalogue-data
          securityContext:
            privileged: false
            seccompProfile:
              type: RuntimeDefault
            capabilities:
              drop:
                - ALL
      volumes:
        - name: catalogue-data
          emptyDir:
            medium: Memory
      nodeSelector:
        kubernetes.io/arch: amd64
        node-role.kubernetes.io/worker: ""
