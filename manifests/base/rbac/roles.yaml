  resources: ["secrets"]
  verbs: ["get"]
  resourceNames: ["carts-db-secret"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: user-role
  namespace: sock-shop
rules:
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get","list"]
  resourceNames: ["user-config"]

- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get"]
  resourceNames: ["session-db-secret"]

