---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: catalogue-role
  namespace: sock-shop
rules:
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get"]
  resourceNames: ["catalogue-db-secret"]

---
apiVersion: rbac.authorization.k8s.io/v1
